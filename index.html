<!doctype html>
<html lang="en">
  <head>
    <title>Spotify Track Info</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        <img
          src="https://img.icons8.com/?size=100&id=YCUDjSzJ3Qgp&format=png&color=000000"
          alt=""
        />
      </div>
      <h2 class="title">Track Finder</h2>
    </nav>
    <div class="container">
      <div class="content">
        <div class="front">
          <div class="text">
            <h1>Spotify Track Finder</h1>
            <p id="typing">Paste a song name to fetch song details.</p>
          </div>

          <div class="text-box">
            <input type="text" id="trackUrl" placeholder="Enter Song Name" />
          </div>

          <div class="btn">
            <button onclick="getTrack()">Get Details</button>
          </div>
        </div>

        <div class="back" id="result"></div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
